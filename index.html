  function updateBufferStatus() {
    try {
      const video = dp.video;
      if (!video || video.readyState < 2) {
        document.getElementById('netSpeed').textContent = '↓缓冲中...';
        return;
      }
      const buffered = video.buffered;
      if (buffered.length > 0) {
        const bufferedEnd = buffered.end(buffered.length - 1);
        const currentTime = video.currentTime;
        const bufferedAhead = bufferedEnd - currentTime;
        if (bufferedAhead > 10) document.getElementById('netSpeed').textContent = '↓缓冲充足';
        else if (bufferedAhead > 5) document.getElementById('netSpeed').textContent = '↓缓冲正常';
        else if (bufferedAhead > 2) document.getElementById('netSpeed').textContent = '↓缓冲较少';
        else document.getElementById('netSpeed').textContent = '↓缓冲中...';
      } else document.getElementById('netSpeed').textContent = '↓加载中...';

  function play(channel, errorElement, url) {
    try {
      document.querySelectorAll('.channel-error').forEach(el => { el.style.display = 'none'; });
      currentErrorElement = errorElement;
      if (dp.video) dp.pause();
      let type = 'normal';
      if (url.includes('.m3u8')) type = 'hls';
      if (url.includes('.flv')) type = 'flv';
      if (!/Mobile|Android|iPhone/.test(navigator.userAgent) && location.protocol === 'https:' && !url.startsWith('http://')) {
        url = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
      }
      let isError = false;
      const errorHandler = () => {
        if (!isError) {
          isError = true;
          if (currentErrorElement) currentErrorElement.style.display = 'block';
        }
      };
      dp.on('error', errorHandler);
      if (dp.video) {
        const originalVideoErrorHandler = dp.video.onerror;
        dp.video.onerror = errorHandler;
        dp._originalVideoErrorHandler = originalVideoErrorHandler;
      }
      if (dp.video) {
        dp.video.style.display = 'block';
        dp.video.style.opacity = '1';
        dp.video.style.visibility = 'visible';
      }
      if (dp.videoWrap) {
        dp.videoWrap.style.display = 'block';
        dp.videoWrap.style.opacity = '1';
        dp.videoWrap.style.visibility = 'visible';
      }
      dp.switchVideo({ url, type });
      dp.video.volume = 0.5;
      dp.play().catch((error) => {
        if (error && (error.name === 'NetworkError' || error.message.includes('decode'))) errorHandler();
      });
      if (dp.video) {
        dp.video.oncanplay = () => {
          isError = false;
          if (currentErrorElement) currentErrorElement.style.display = 'none';
          if (dp.video) {
            dp.video.style.display = 'block';
            dp.video.style.opacity = '1';
            dp.video.style.visibility = 'visible';
          }
        };
        dp.video.onloadeddata = () => {
          if (dp.video) {
            dp.video.style.display = 'block';
            dp.video.style.opacity = '1';
            dp.video.style.visibility = 'visible';
          }
        };
      }
    } catch (e) {
      if (e && (e.name === 'NetworkError' || e.message.includes('network'))) errorElement.style.display = 'block';
    }
  }

  function loadChannels() {
    const sourceUrl = 'https://raw.githubusercontent.com/bang359/dsj/main/iphone.txt';
    if (!Security.validateUrl(sourceUrl)) {
      console.error('安全警告: 无效的直播源URL');
      return;
    }
    fetch(sourceUrl)
      .then(r => {
        if (!r.ok) throw new Error(`HTTP错误: ${r.status}`);
        return r.text();
      })
      .then(txt => {
        if (txt.length > 1000000) throw new Error('安全警告: 响应内容过大');
        txt.split('\n').forEach(line => {
          if (!line.trim()) return;
          var tagStart = '<sc' + 'ript';
          var jsProto = 'java' + 'script:';
          var dtProto = 'da' + 'ta:';
          if (line.indexOf(tagStart) !== -1 || line.indexOf(jsProto) !== -1 || line.indexOf(dtProto) !== -1) {
            console.warn('安全警告: 检测到潜在的恶意内容');
            return;
          }
          if (line.includes(',#genre#')) {
            const genreName = line.split(',')[0];
            if (!Security.validateChannelName(genreName)) {
              console.warn('安全警告: 无效的分类名称');
              return;
            }
            const d = document.createElement('div');
            d.className = 'genre';
            Security.setText(d, genreName);
            list.appendChild(d);
            return;
          }
          const arr = line.split(',');
          if (arr.length >= 2 && arr[1].startsWith('http')) {
            const channelName = arr[0];
            const channelUrl = arr[1];
            if (!Security.validateChannelName(channelName)) {
              console.warn('安全警告: 无效的频道名称:', channelName);
              return;
            }
            if (!Security.validateUrl(channelUrl)) {
              console.warn('安全警告: 无效的频道URL:', channelUrl);
              return;
            }
            const item = document.createElement('div');
            item.className = 'channel';
            const logo = document.createElement('img');
            logo.className = 'channel-logo';
            logo.src = getChannelLogo(channelName);
            logo.alt = '';
            logo.onerror = () => {
              logo.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%234a90d9"%3E%3Cpath d="M8 5v14l11-7z"/%3E%3C/svg%3E';
            };
            item.appendChild(logo);
            const nameSpan = document.createElement('span');
            nameSpan.className = 'channel-name';
            Security.setText(nameSpan, channelName);
            item.appendChild(nameSpan);
            const errorElement = document.createElement('div');
            errorElement.className = 'channel-error';
            Security.setText(errorElement, '频道已失效，请等待更新');

              document.querySelectorAll('.channel').forEach(i => i.classList.remove('active'));

            };
            list.appendChild(item);

        }, 200);
